  jellyfin:
    image: linuxserver/jellyfin
    container_name: jellyfin
    network_mode: container:tailscale-sidecar
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "44"
      - "992"
    volumes:
      - ${ARRPATH}Jellyfin/config:/config
      - ${ARRPATH}Radarr/movies:/data/Movies
      - ${ARRPATH}Sonarr/tvshows:/data/TVShows
      - ${ARRPATH}Downloads/anime:/data/Anime
      - ${ARRPATH}Lidarr/music:/data/Music
      - ${ARRPATH}jellyfin-transcode:/transcode
      - ./cache:/cache
    environment:
      - LIBVA_DRIVER_NAME=iHD
      - TZ=Asia/Kolkata
    env_file:
      - '.env'
    restart: unless-stopped
          
