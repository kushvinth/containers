version: '3.8'

services:
  tailscale-sidecar:
    image: tailscale/tailscale:latest
    container_name: tailscale-sidecar
    hostname: jellyfin
    environment:
      - TS_EXTRA_ARGS=--login-server=https://headscale.pranaovs.me
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234
      - TS_AUTH_ONCE=true
      - TS_PORT=41612

    configs:
      - source: ts-serve
        target: /config/serve.json
    volumes:
      - ${ARRPATH}Jellyfin/tailscale-state:/var/lib/tailscale
    ports:
      - '8096:8096/tcp'   # Jellyfin web interface (exposing only this port for prod)
      - '41642:41642/udp' # WireGuard listen port for direct peer connections (41641 is used by host tailscaled)
      - '1900:1900/udp'
      - '7359:7359/udp'

    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      prod:
      arr_warp:
        aliases:
          - tailscale-jellyfin

configs:
  ts-serve:
    content: |
      {"TCP":{"443":{"HTTPS":true}},
      "Web":{"$${TS_CERT_DOMAIN}:443":
          {"Handlers":{"/":
            {"Proxy":"http://127.0.0.1:8096"}}}},
      "AllowFunnel":{"$${TS_CERT_DOMAIN}:443":false}}

networks:
  prod:
    name: prod
    driver: bridge
  arr_warp:
    external: true
    name: arr_warp
