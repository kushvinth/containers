services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft-speedrun-server
    ports:
      - "25567:25565"
      - "19162:19132/udp"
      - "24457:24454/udp"
    environment:
      EULA: "TRUE"
      TYPE: "FABRIC"
      VERSION: "1.21.11"
      MEMORY: "1G"
      MAX_TICK_TIME: "-1"
      TZ: "Asia/Kolkata"
      USE_MEOWICE_FLAGS: "true"
      USE_AIKAR_FLAGS: "true"
      AUTOPAUSE_KNOCK_INTERFACE: "eth0"
      ONLINE_MODE: "false"
      VIEW_DISTANCE: "16"
      SIMULATION_DISTANCE: "10"
      MODRINTH_PROJECTS: |-
        clumps
        lithium
        krypton
        ferrite-core
        styledplayerlist
        badpackets
        chunky
        
        simple-voice-chat
        ore-harvester
        tree-harvester
        villager-names-serilum
        rightclickharvest
        easyauth
        your-items-are-safe
        inventory-sorting
        skinrestorer
        no-dim
        anti-xray
        appleskin
        enchantment-lore

        katters-structures
        dungeons-and-taverns
        towns-and-towers
      MODRINTH_DOWNLOAD_DEPENDENCIES: "required"
      MODRINTH_ALLOWED_VERSION_TYPE: "alpha"
      ENFORCE_SECURE_PROFILE: "false"
      RCON_CMDS_STARTUP: |-
        gamerule players_sleeping_percentage 1
        chunky continue
      BUG_REPORT_LINK: "https://github.com/kushvinth/containers"
    volumes:
      - ./data:/data
    restart: unless-stopped
